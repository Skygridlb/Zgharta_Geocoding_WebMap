<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Zgharta Geocoding System</title>

<!-- Add-to-Home-Screen (works on iOS + Android) -->
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#0f3d3e" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Zgharta Geo" />
<link rel="apple-touch-icon" href="logo/skygrid-logo-.png" />

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-polylinedecorator@1.6.0/dist/leaflet.polylineDecorator.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-textpath@1.2.3/leaflet.textpath.js"></script>

<style>
  :root{--panel:#0f3d3e;--panel-2:#14504f;--ink:#eef6f4;--muted:#9dc2bd;--accent:#f2a35e;--line:rgba(255,255,255,.12)}
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:"Segoe UI",system-ui,Arial,sans-serif}
  #map{position:absolute;inset:0;background:#0b1c1c}

  .panel{position:absolute;top:12px;left:12px;z-index:1000;width:352px;max-width:calc(100vw - 24px);
    background:var(--panel);color:var(--ink);border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.35);overflow:hidden}
  .panel__head{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--panel-2);border-bottom:1px solid var(--line);cursor:pointer;justify-content:space-between}
  .panel__toggle{background:transparent;border:0;color:var(--ink);font-size:20px;line-height:1;cursor:pointer;padding:2px 6px;flex:0 0 auto;transition:transform .2s}
  .panel.collapsed .panel__body{display:none}
  .panel.collapsed .panel__head{border-bottom:0}
  .panel.collapsed .panel__toggle{transform:rotate(-90deg)}
  .panel__head img{height:36px;width:auto;border-radius:6px;background:#fff;padding:2px}
  .panel__title{font-size:14px;font-weight:700;line-height:1.1}
  .panel__title small{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:2px}
  .panel__body{padding:12px 14px;max-height:calc(100vh - 120px);overflow:auto}

  label.fld{display:block;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin:12px 0 4px}
  label.fld:first-child{margin-top:0}
  select,input[type="text"]{width:100%;font-size:13px;padding:9px 10px;border-radius:8px;border:1px solid var(--line);
    background:#0b3231;color:var(--ink);outline:none}
  select:disabled,input:disabled{opacity:.4}
  select:focus,input:focus{border-color:var(--accent)}
  .zonename{font-size:14px;font-weight:700;color:var(--accent);min-height:18px;margin-top:6px}

  .row{display:flex;gap:6px}
  .row .cell{flex:1;min-width:0}
  .row .cap{font-size:10px;color:var(--muted);margin:0 0 3px 2px}

  .code-preview{font-size:12px;color:var(--muted);margin-top:8px}
  .code-preview b{color:var(--ink)}

  .btns{display:flex;gap:8px;margin-top:12px}
  button{flex:1;font-size:13px;font-weight:600;padding:10px;border-radius:8px;border:0;cursor:pointer}
  #btnFind{background:var(--accent);color:#3a2405}
  #btnReset{background:#0b3231;color:var(--ink);border:1px solid var(--line)}
  button:disabled{opacity:.5;cursor:not-allowed}

  .sep{border:none;border-top:1px solid var(--line);margin:14px 0}
  .results{list-style:none;margin:6px 0 0;padding:0;max-height:30vh;overflow:auto}
  .results li{padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;border:1px solid transparent}
  .results li:hover{background:var(--panel-2);border-color:var(--line)}
  .results li b{color:var(--accent)}
  .results li .sub{display:block;font-size:11px;color:var(--muted);margin-top:2px}
  .results .empty{color:var(--muted);cursor:default;font-size:12px;padding:8px 10px}
  .hint{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4}

  .road-label{background:#fdf3a0;border:1px solid #b9902a;color:#4a3a00;font-size:11px;font-weight:700;padding:1px 6px;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.35);white-space:nowrap}
  .road-label::before{display:none}
  .zone-label{background:#fff;border:1px solid #333;color:#111;font-size:15px;font-weight:800;padding:2px 9px;border-radius:4px;box-shadow:0 2px 6px rgba(0,0,0,.35)}
  .zone-label::before{display:none}
  .hide-road-labels .road-label{display:none}

  .leaflet-popup-content{margin:12px 14px;font-size:13px;line-height:1.5}
  .pop h4{margin:0 0 6px;font-size:14px;color:#0f3d3e}
  .pop table{border-collapse:collapse;width:100%}
  .pop td{padding:2px 6px 2px 0;vertical-align:top}
  .pop td.k{color:#6b7a78;white-space:nowrap;font-size:12px}
  .pop td.v{font-weight:600}

  .legend{background:rgba(15,61,62,.92);color:var(--ink);padding:8px 10px;border-radius:8px;font-size:12px;line-height:1.7;box-shadow:0 2px 10px rgba(0,0,0,.3)}
  .legend b{display:block;margin-bottom:3px;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .legend .sw{display:inline-block;width:22px;height:0;border-top:3px solid;margin-right:6px;vertical-align:middle}
  .legend .bx{display:inline-block;width:12px;height:12px;border:2px solid #ff2d2d;margin-right:6px;vertical-align:middle}

  .brand{position:absolute;right:10px;bottom:24px;z-index:900;display:flex;gap:8px;align-items:center}
  .brand img{height:42px;width:auto;background:#fff;border-radius:8px;padding:3px;box-shadow:0 2px 10px rgba(0,0,0,.3)}

  .logos{display:flex;gap:12px;align-items:center;background:#fff;border-radius:10px;padding:8px 12px;box-shadow:0 2px 10px rgba(0,0,0,.3);max-width:min(94vw,560px)}
  .logos .logo-muni{height:52px;width:auto;display:block}
  .powered{display:flex;flex-direction:column;align-items:center;gap:2px}
  .powered .pw-label{font-size:11px;font-weight:700;color:#111;white-space:nowrap}
  .powered img{height:78px;width:auto;display:block}
  .contact{display:flex;flex-direction:column;justify-content:center;line-height:1.25;border-left:1px solid #e2e2e2;padding-left:10px}
  .contact .cname{font-size:14px;font-weight:800;color:#111}
  .contact .ctitle{font-size:11px;font-weight:700;color:#222;text-transform:uppercase;letter-spacing:.2px}
  .contact .cphone{font-size:12px;color:#111;margin-top:3px}
  .contact .cemail{font-size:12px;color:#0a58ca;text-decoration:underline}
  .contact .social{display:flex;gap:6px;margin-top:6px}
  .contact .pill{font-size:11px;font-weight:700;color:#111 !important;text-decoration:none;border:1px solid #333;border-radius:6px;padding:3px 9px;background:#f3f3f3}
  .contact .pill:hover{background:#e6e6e6}
  .contact .tagline{font-size:10px;color:#777;letter-spacing:.5px;margin-top:6px}

  .navbtn{display:inline-block;margin-top:8px;padding:7px 10px;border-radius:7px;background:#1a73e8;color:#fff !important;
    font-weight:600;font-size:12px;text-decoration:none;text-align:center}
  .navbtn:hover{background:#1666d0}

  @media (max-width:520px){
    .panel{width:calc(100vw - 16px);top:8px;left:8px}
    .panel__body{max-height:62vh}
    .results{max-height:22vh}
  }
  /* phones: branding becomes a full-width bar at the bottom */
  @media (max-width:620px){
    .logos{position:fixed;left:0;right:0;bottom:0;width:100%;max-width:none;border-radius:0;
      justify-content:center;gap:12px;padding:6px 10px;box-shadow:0 -2px 12px rgba(0,0,0,.35);z-index:1000;flex-wrap:nowrap}
    .logos .logo-muni{height:40px}
    .powered img{height:46px}
    .powered .pw-label{font-size:10px}
    .contact{display:flex;padding-left:10px}
    .contact .ctitle,.contact .cphone,.contact .cemail,.contact .tagline{display:none}  /* keep the bar short */
    .contact .cname{font-size:12px}
    .contact .social{margin-top:4px}
    .leaflet-bottom{bottom:74px}   /* lift legend + attribution above the branding bar */
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div class="panel__head" id="panelHead">
    <div class="panel__title">Zgharta Geocoding System<small>Find your building</small></div>
    <button class="panel__toggle" id="panelToggle" aria-label="Show or hide search">▾</button>
  </div>
  <div class="panel__body">

    <label class="fld">Zone code</label>
    <select id="selZone"><option value="">— select zone —</option></select>
    <div class="zonename" id="zoneName"></div>

    <label class="fld">Street code (primary · secondary · tertiary)</label>
    <div class="row">
      <div class="cell"><div class="cap">Primary</div>
        <input id="pPrim" type="text" placeholder="e.g. 1" list="dlPrim" disabled autocomplete="off"></div>
      <div class="cell"><div class="cap">Secondary</div>
        <input id="pSec" type="text" placeholder="e.g. 10" list="dlSec" disabled autocomplete="off"></div>
      <div class="cell"><div class="cap">Tertiary</div>
        <input id="pTer" type="text" placeholder="e.g. 04" list="dlTer" disabled autocomplete="off"></div>
    </div>
    <datalist id="dlPrim"></datalist><datalist id="dlSec"></datalist><datalist id="dlTer"></datalist>

    <label class="fld">Building number</label>
    <div class="row">
      <div class="cell" style="flex:2"><div class="cap">Number</div>
        <input id="bNum" type="text" placeholder="e.g. 63" list="dlNum" disabled autocomplete="off"></div>
      <div class="cell"><div class="cap">Letter</div>
        <input id="bLet" type="text" placeholder="e.g. C" list="dlLet" disabled autocomplete="off"></div>
    </div>
    <datalist id="dlNum"></datalist><datalist id="dlLet"></datalist>

    <div class="code-preview">Address: <b id="codePreview">—</b></div>

    <div class="btns">
      <button id="btnFind" disabled>Find building</button>
      <button id="btnReset">Reset</button>
    </div>

    <hr class="sep"/>
    <label class="fld">Quick find (building no. or road name)</label>
    <input id="quick" type="text" placeholder="e.g. 63C or Sleiman Frangieh" autocomplete="off" list="quicklist"/>
    <datalist id="quicklist"></datalist>
    <ul class="results" id="results"></ul>
    <div class="hint">Fill Primary, then Secondary/Tertiary if your street has them. Number is the digits, Letter is the suffix.</div>
  </div>
</div>

<script>
/* ================================================================
   ▼▼▼  SETTINGS  ▼▼▼
   ================================================================ */
const SETTINGS = {
  startCenter:null, startZoom:null,
  municipalityLogo:"logo/Municipality logo.png",
  // your branding shown next to the logos (edit freely)
  contact:{
    name:"FADI BOULOS KASS HANNA",
    title1:"OWNER | GENERAL MANAGER",
    title2:"GEOSPATIAL ENGINEER",
    phone:"+961 71 709 417",
    email:"fadi@skygridlb.com",
    tagline:"YOUR SPACE • OUR DATA",
    facebook:"https://www.facebook.com/skygridlb",
    instagram:"https://www.instagram.com/skygridlb",
    linkedin:"https://www.linkedin.com/company/skygridlb"
  },
  ortho:{ show:true, urlPattern:"tiles/{z}/{x}/{y}.jpg", minZoom:14, maxZoom:20, tms:false, opacity:1.0 },
  buildingLayers:[
    { name:"Zgharta Buildings",       file:"data/Zgharta_Buildings.geojson" },
    { name:"Aardat Buildings",        file:"data/Aardat_Buildings.geojson" },
    { name:"Mazraat Ejbeh Buildings", file:"data/Mazraat_Ejbeh_Buildings.geojson" },
    { name:"El Hariq Buildings",      file:"data/El_Hariq_Buildings.geojson" },
    { name:"El Talle Buildings",      file:"data/El_Talle_Buildings.geojson" }
  ],
  roadNetwork:{ name:"Street Network", file:"data/Zgharta_Road_Network.geojson" },
  zones:{ name:"Zones", file:"data/ZONES.geojson" },
  colors:{ building:"#ff2d2d", primary:"#2ecc40", secondary:"#ff851b", tertiary:"#ffdc00", roadOther:"#22d3ee", highlight:"#ff00ff" },
  roadLabelMinZoom:16,
  fields:{
    zoneCode:["ZONE_CODE","Zone_Code"],
    zoneName:["ZONE_NAME","Zone_Name"],
    streetAdd:["Street_Add","Streed_Add","STREET_ADD"],
    roadName:["RoadName","Road_Name","ROADNAME"],
    building:["B_ADDRESS","B_Address","BLDG_NO"],
    geocode:["GEOCODING","GEOCODE"],
    roadName_road:["RoadName","Street_Add","Road_Name","Name"],
    roadNameOnly:["RoadName","Road_Name","ROADNAME","Name"],
    roadRawId:["Raw_ID_26","RAW_ID_26","RawID_26","Raw_Id_26"],
    roadType_road:["Type","TYPE","Class"],
    roadStreetAdd:["Street_Add","Streed_Add"],
    zoneLabel:["ZONE_CODE","Zone_Code","ZONE","Code"]
  }
};
/* ▲▲▲ END SETTINGS ▲▲▲ */
const C = SETTINGS.colors;

/* ---------- map ---------- */
const map = L.map("map",{zoomControl:true,minZoom:5,maxZoom:22});
const esriSat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
  {maxZoom:22,maxNativeZoom:19,attribution:"Imagery © Esri"}).addTo(map);
const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"© OpenStreetMap"});
const orthoLayer = L.tileLayer(SETTINGS.ortho.urlPattern,{tms:SETTINGS.ortho.tms,minZoom:SETTINGS.ortho.minZoom,maxZoom:22,
  maxNativeZoom:SETTINGS.ortho.maxZoom,opacity:SETTINGS.ortho.opacity,
  errorTileUrl:"data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs="});
if(SETTINGS.ortho.show) orthoLayer.addTo(map);
const baseLayers={"Satellite (Esri)":esriSat,"OpenStreetMap":osm};
const overlayLayers={}; overlayLayers["Orthophoto"]=orthoLayer;

// logos + "Powered by" + contact card, top-right corner
const logosCtl=L.control({position:"topright"});
logosCtl.onAdd=function(){ const d=L.DomUtil.create("div","logos");
  const ct=SETTINGS.contact||{};
  const pill=(u,t)=> u?`<a class="pill" href="${u}" target="_blank" rel="noopener">${t}</a>`:"";
  const social=`<div class="social">${pill(ct.facebook,"Facebook")}${pill(ct.instagram,"Instagram")}${pill(ct.linkedin,"LinkedIn")}</div>`;
  const emailLink = ct.email?`<a class="cemail" href="mailto:${ct.email}">${ct.email}</a>`:"";
  d.innerHTML=
    `<img class="logo-muni" src="${SETTINGS.municipalityLogo}" alt="Municipality" onerror="this.style.display='none'">`+
    `<div class="powered"><div class="pw-label">Powered by</div>`+
      `<img src="logo/skygrid-logo-.png" alt="SkyGrid" onerror="this.style.display='none'"></div>`+
    `<div class="contact">`+
      `<div class="cname">${ct.name||""}</div>`+
      (ct.title1?`<div class="ctitle">${ct.title1}</div>`:"")+
      (ct.title2?`<div class="ctitle">${ct.title2}</div>`:"")+
      (ct.phone?`<div class="cphone">${ct.phone}</div>`:"")+
      emailLink+
      social+
      (ct.tagline?`<div class="tagline">${ct.tagline}</div>`:"")+
    `</div>`;
  L.DomEvent.disableClickPropagation(d);
  return d; };
logosCtl.addTo(map);

/* ---------- helpers ---------- */
function getProp(props,names){
  if(!props) return "";
  for(const n of names) if(props[n]!==undefined&&props[n]!==null&&props[n]!=="") return props[n];
  const lower={}; for(const k in props) lower[k.toLowerCase()]=props[k];
  for(const n of names){ const v=lower[n.toLowerCase()]; if(v!==undefined&&v!==null&&v!=="") return v; }
  return "";
}
function streetClass(sa){ const p=String(sa).split("-").filter(s=>s!==""); return p.length<=1?"Primary":(p.length===2?"Secondary":"Tertiary"); }
function roadColorFromType(t){ t=String(t||"").toLowerCase();
  if(t.includes("prim"))return C.primary; if(t.includes("sec"))return C.secondary; if(t.includes("ter"))return C.tertiary; return C.roadOther; }
// road color derived from the street code itself (segment count = class)
function roadColorFromCode(sa){ const c=streetClass(sa); return c==="Primary"?C.primary:(c==="Secondary"?C.secondary:C.tertiary); }
// classify a road: Type field first, else street-code segment count
function roadClass(props){
  const t=String(getProp(props,SETTINGS.fields.roadType_road)).toLowerCase();
  if(t.includes("prim")) return "Primary";
  if(t.includes("sec"))  return "Secondary";
  if(t.includes("ter"))  return "Tertiary";
  const n=findStreetCode(props).split("-").filter(s=>s!=="").length;
  if(n>=3) return "Tertiary"; if(n===2) return "Secondary"; if(n===1) return "Primary";
  return "Other";
}
// road color from class (Other -> cyan)
function roadColorForFeature(props){
  const c=roadClass(props);
  return c==="Primary"?C.primary : c==="Secondary"?C.secondary : c==="Tertiary"?C.tertiary : C.roadOther;
}
// find the street code on a road feature, no matter what the column is named.
// 1) try configured field; 2) otherwise scan all attributes for a value like 1-10 or 1-10-01
function findStreetCode(props){
  if(!props) return "";
  let v=String(getProp(props,SETTINGS.fields.roadStreetAdd)).trim();
  if(v!=="" && v!=="0") return v;
  for(const k in props){ const val=String(props[k]).trim();
    if(/^\d+(-\d+)+$/.test(val)) return val; }   // e.g. 1-10, 1-10-01
  return v;
}
// distinct color per zone so each zone is recognizable
const ZONE_PALETTE=["#e6194B","#3cb44b","#4363d8","#f58231","#911eb4","#42d4f4","#f032e6","#bfef45",
  "#fabed4","#469990","#dcbeff","#9A6324","#fffac8","#800000","#aaffc3","#808000","#ffd8b1","#000075","#a9a9a9"];
function hashCode(s){ let h=0; for(let i=0;i<s.length;i++){ h=(h<<5)-h+s.charCodeAt(i); h|=0; } return h; }
function zoneColor(code){ const n=parseInt(code,10); const i=isNaN(n)?hashCode(String(code)):n; return ZONE_PALETTE[Math.abs(i)%ZONE_PALETTE.length]; }
// split a building number into digits + suffix letters, e.g. "63C" -> ["63","C"]
function splitBuilding(b){ const m=String(b).trim().match(/^(\d+)\s*([A-Za-z]*)$/); return m?[m[1],m[2].toUpperCase()]:[String(b).trim(),""]; }

function navBtn(center){ if(!center) return "";
  const u=`https://www.google.com/maps/dir/?api=1&destination=${center.lat},${center.lng}`;
  return `<a class="navbtn" href="${u}" target="_blank" rel="noopener">➤ Navigate in Google Maps</a>`; }
function buildingPopup(props,areaName,center){
  const rows=[]; const add=(k,v)=>{ if(v!==""&&v!=null) rows.push(`<tr><td class="k">${k}</td><td class="v">${v}</td></tr>`); };
  add("Zone",getProp(props,SETTINGS.fields.zoneName));
  add("Zone code",getProp(props,SETTINGS.fields.zoneCode));
  const sa=getProp(props,SETTINGS.fields.streetAdd);
  add("Street code",sa); if(sa!=="") add("Class",streetClass(sa));
  add("Road name",getProp(props,SETTINGS.fields.roadName));
  add("Building",getProp(props,SETTINGS.fields.building));
  add("Area",areaName);
  add("Geocode",getProp(props,SETTINGS.fields.geocode));
  return `<div class="pop"><h4>Building ${getProp(props,SETTINGS.fields.building)||""}</h4><table>${rows.join("")}</table>${navBtn(center)}</div>`;
}
function roadPopup(props){
  const rows=[]; const add=(k,v)=>{ if(v!==""&&v!=null) rows.push(`<tr><td class="k">${k}</td><td class="v">${v}</td></tr>`); };
  const name=getProp(props,SETTINGS.fields.roadNameOnly);
  const rawId=getProp(props,SETTINGS.fields.roadRawId);
  const cls=roadClass(props);
  add("Street Address",rawId);      // Street Address = Raw ID
  add("Class",cls);
  add("Road name",name);
  const title = rawId!=="" ? String(rawId) : (name||"Street");
  return `<div class="pop"><h4>${title}</h4><table>${rows.join("")}</table></div>`;
}

/* ---------- stores ---------- */
const buildingIndex=[];   // {area,props,layer,zoneCode,zoneName,streetAdd,roadName,building,p1,p2,p3,bnum,blet}
const allBounds=[];
const zones={};           // zoneCode -> {name, records:[]}

/* ---------- load buildings ---------- */
let loaded=0; const total=SETTINGS.buildingLayers.length;
SETTINGS.buildingLayers.forEach(cfg=>{
  fetch(cfg.file).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
  .then(gj=>{
    const layer=L.geoJSON(gj,{
      style:{color:C.building,weight:1.4,fill:true,fillColor:C.building,fillOpacity:0},
      pointToLayer:(f,ll)=>L.circleMarker(ll,{radius:6,color:C.building,fill:true,fillColor:C.building,fillOpacity:.15,weight:1.8}),
      onEachFeature:(feature,lyr)=>{
        const p=feature.properties||{};
        let center=null; try{ center = lyr.getBounds ? lyr.getBounds().getCenter() : (lyr.getLatLng?lyr.getLatLng():null); }catch(e){}
        lyr.bindPopup(buildingPopup(p,cfg.name,center),{maxWidth:280});
        const sa=String(getProp(p,SETTINGS.fields.streetAdd));
        const parts=sa.split("-").filter(s=>s!=="");
        const b=String(getProp(p,SETTINGS.fields.building));
        const [bnum,blet]=splitBuilding(b);
        const rec={ area:cfg.name, props:p, layer:lyr,
          zoneCode:String(getProp(p,SETTINGS.fields.zoneCode)),
          zoneName:String(getProp(p,SETTINGS.fields.zoneName)),
          streetAdd:sa, roadName:String(getProp(p,SETTINGS.fields.roadName)),
          building:b, p1:parts[0]||"", p2:parts[1]||"", p3:parts[2]||"", bnum, blet };
        buildingIndex.push(rec);
      }
    }).addTo(map);
    overlayLayers[cfg.name]=layer;
    try{ const bb=layer.getBounds(); if(bb.isValid()) allBounds.push(bb); }catch(e){}
    if(gj.features&&gj.features[0]) console.log(`[${cfg.name}] fields:`,Object.keys(gj.features[0].properties||{}));
  })
  .catch(err=>console.warn("Could not load "+cfg.file+": "+err.message))
  .finally(()=>{ loaded++; if(loaded===total) finishLoad(); });
});

/* ---------- roads (lines + arrows + road-name-along-street + popup) ---------- */
const roadGroup=L.layerGroup();
const roadLines=[];   // road names drawn PARALLEL to each street, only when zoomed in enough
fetch(SETTINGS.roadNetwork.file).then(r=>r.json()).then(gj=>{
  if(gj.features&&gj.features[0]){ console.log("[Roads] fields:",Object.keys(gj.features[0].properties||{}));
    console.log("[Roads] sample values:",gj.features[0].properties); }
  const lines=L.geoJSON(gj,{
    style:f=>({color:roadColorForFeature(f.properties),weight:4,opacity:.97}),
    onEachFeature:(feature,lyr)=>{
      const p=feature.properties||{};
      const cls=roadClass(p);
      const sa=findStreetCode(p);
      const rawId=String(getProp(p,SETTINGS.fields.roadRawId));
      const rname=String(getProp(p,SETTINGS.fields.roadNameOnly));
      lyr.bindPopup(roadPopup(p),{maxWidth:260});
      const code = (cls==="Primary") ? rawId : sa;      // primary → Raw_ID ; others → street code
      let label = code || "";
      if(rname) label = label ? (label + "  ·  " + rname) : rname;   // code + road name, parallel
      roadLines.push({lyr, label});
      if(L.polylineDecorator&&lyr.getLatLngs){ try{
        roadGroup.addLayer(L.polylineDecorator(lyr,{patterns:[{offset:"6%",repeat:"14%",
          symbol:L.Symbol.arrowHead({pixelSize:9,polygon:false,pathOptions:{stroke:true,color:roadColorForFeature(p),weight:2,opacity:.97}})}]}));
      }catch(e){} }
    }
  });
  roadGroup.addLayer(lines); roadGroup.addTo(map);
  overlayLayers[SETTINGS.roadNetwork.name]=roadGroup;
  refreshControls(); refreshRoadText();
}).catch(e=>console.warn("Roads: "+e.message));

// road names drawn PARALLEL to each street, only when zoomed in enough
function refreshRoadText(){
  const el=map.getContainer();
  const show = map.getZoom() >= SETTINGS.roadLabelMinZoom;
  if(show) L.DomUtil.removeClass(el,"hide-road-labels"); else L.DomUtil.addClass(el,"hide-road-labels");
  roadLines.forEach(o=>{ if(!o.lyr.setText) return; try{
    o.lyr.setText(null);
    if(show && o.label) o.lyr.setText("  "+o.label+"  ",{center:true,offset:4,
      attributes:{fill:"#111",stroke:"#fff","stroke-width":3.5,"paint-order":"stroke","font-weight":"700","font-size":"12px"}});
  }catch(e){} });
}

/* ---------- zones (labels only) ---------- */
fetch(SETTINGS.zones.file).then(r=>r.json()).then(gj=>{
  const layer=L.geoJSON(gj,{
    interactive:false,                                   // don't block clicks on buildings
    style:f=>{ const col=zoneColor(String(getProp(f.properties,SETTINGS.fields.zoneLabel)));
               return {stroke:false,weight:0,fill:true,fillColor:col,fillOpacity:.3}; },
    onEachFeature:(feature,lyr)=>{ const code=getProp(feature.properties,SETTINGS.fields.zoneLabel);
      if(code!==""&&lyr.getBounds) lyr.bindTooltip(String(code),{permanent:true,direction:"center",className:"zone-label"}); }
  });
  overlayLayers[SETTINGS.zones.name]=layer; layer.addTo(map);
  try{ layer.bringToBack(); }catch(e){}                  // keep zones beneath buildings/roads
  refreshControls();
}).catch(e=>console.warn("Zones: "+e.message));

/* ---------- controls + legend ---------- */
let layerControl=null;
function refreshControls(){ if(layerControl) map.removeControl(layerControl);
  const collapsed = window.innerWidth < 760;   // tidy on phones
  layerControl=L.control.layers(baseLayers,overlayLayers,{collapsed:collapsed}).addTo(map); }
const legend=L.control({position:"bottomleft"});
legend.onAdd=function(){ const d=L.DomUtil.create("div","legend");
  d.innerHTML=`<b>Streets</b><span class="sw" style="border-color:${C.primary}"></span>Primary<br>
    <span class="sw" style="border-color:${C.secondary}"></span>Secondary<br>
    <span class="sw" style="border-color:${C.tertiary}"></span>Tertiary<br>
    <span class="sw" style="border-color:${C.roadOther}"></span>Other<br>
    <b style="margin-top:6px">Buildings</b><span class="bx"></span>Building Rooftop`; return d; };
legend.addTo(map);
map.on("zoomend",()=>{ try{ refreshRoadText(); }catch(e){} });

/* ================================================================
   SEGMENTED STREET + BUILDING SEARCH
   ================================================================ */
// collapsible panel (so the map is visible on phones)
const panelEl=document.querySelector(".panel");
document.getElementById("panelHead").addEventListener("click",()=>{ panelEl.classList.toggle("collapsed"); });
const isMobile=()=> window.innerWidth < 620;
if(isMobile()) panelEl.classList.add("collapsed");   // start collapsed on phones
function collapseOnMobile(){ if(isMobile()) panelEl.classList.add("collapsed"); }

const selZone=document.getElementById("selZone");
const zoneNameEl=document.getElementById("zoneName");
const pPrim=document.getElementById("pPrim"), pSec=document.getElementById("pSec"), pTer=document.getElementById("pTer");
const bNum=document.getElementById("bNum"), bLet=document.getElementById("bLet");
const dlPrim=document.getElementById("dlPrim"), dlSec=document.getElementById("dlSec"), dlTer=document.getElementById("dlTer");
const dlNum=document.getElementById("dlNum"), dlLet=document.getElementById("dlLet");
const codePreview=document.getElementById("codePreview");
const btnFind=document.getElementById("btnFind"), btnReset=document.getElementById("btnReset");
let highlight=[];

function uniqSorted(arr){ return [...new Set(arr.filter(v=>v!==""))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})); }
function fillDatalist(dl,vals){ dl.innerHTML=vals.map(v=>`<option value="${String(v).replace(/"/g,'')}">`).join(""); }
function zoneRecs(){ const z=selZone.value; return (zones[z]?zones[z].records:[]); }

function currentStreetCode(){
  const a=pPrim.value.trim(), b=pSec.value.trim(), c=pTer.value.trim();
  if(!a) return "";
  if(!b) return a;
  if(!c) return a+"-"+b;
  return a+"-"+b+"-"+c;
}
function updatePreview(){
  const code=currentStreetCode();
  const num=bNum.value.trim(), let_=bLet.value.trim();
  const bldg=num?(num+let_):"";
  codePreview.textContent = (selZone.value?("Zone "+selZone.value):"—") + (code?(" · St "+code):"") + (bldg?(" · Bldg "+bldg):"");
}

/* build zone dropdown */
function buildZones(){
  buildingIndex.forEach(r=>{ const zc=r.zoneCode||"(none)";
    if(!zones[zc]) zones[zc]={name:r.zoneName||"",records:[]};
    if(!zones[zc].name&&r.zoneName) zones[zc].name=r.zoneName;
    zones[zc].records.push(r); });
  Object.keys(zones).sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})).forEach(zc=>{
    const o=document.createElement("option"); o.value=zc; o.textContent=zones[zc].name?`${zc} — ${zones[zc].name}`:zc; selZone.appendChild(o);
  });
  // quick list = road names
  const names=uniqSorted(buildingIndex.map(r=>r.roadName));
  fillDatalist(document.getElementById("quicklist"),names);
}

selZone.addEventListener("change",()=>{
  const zc=selZone.value;
  zoneNameEl.textContent = zc&&zones[zc]?zones[zc].name:"";
  [pPrim,pSec,pTer,bNum,bLet].forEach(i=>{ i.value=""; i.disabled=true; });
  if(zc){ pPrim.disabled=false; fillDatalist(dlPrim, uniqSorted(zoneRecs().map(r=>r.p1))); }
  refreshFindState(); updatePreview();
});

pPrim.addEventListener("input",()=>{
  const p1=pPrim.value.trim();
  pSec.value=""; pTer.value=""; pSec.disabled=!p1; pTer.disabled=true;
  if(p1) fillDatalist(dlSec, uniqSorted(zoneRecs().filter(r=>r.p1===p1&&r.p2!=="").map(r=>r.p2)));
  refreshBuildingBoxes(); refreshFindState(); updatePreview();
});
pSec.addEventListener("input",()=>{
  const p1=pPrim.value.trim(), p2=pSec.value.trim();
  pTer.value=""; pTer.disabled=!p2;
  if(p2) fillDatalist(dlTer, uniqSorted(zoneRecs().filter(r=>r.p1===p1&&r.p2===p2&&r.p3!=="").map(r=>r.p3)));
  refreshBuildingBoxes(); refreshFindState(); updatePreview();
});
pTer.addEventListener("input",()=>{ refreshBuildingBoxes(); refreshFindState(); updatePreview(); });

function streetRecs(){ const code=currentStreetCode(); if(!code) return [];
  return zoneRecs().filter(r=>r.streetAdd===code); }
function refreshBuildingBoxes(){
  const recs=streetRecs();
  if(recs.length){ bNum.disabled=false; fillDatalist(dlNum, uniqSorted(recs.map(r=>r.bnum))); }
  else { bNum.disabled=true; bNum.value=""; }
  bLet.disabled=true; bLet.value=""; dlLet.innerHTML="";
}
bNum.addEventListener("input",()=>{
  const num=bNum.value.trim();
  const recs=streetRecs().filter(r=>r.bnum===num);
  const letters=uniqSorted(streetRecs().filter(r=>r.bnum===num).map(r=>r.blet));
  bLet.disabled = !num || letters.filter(l=>l!=="").length===0;
  fillDatalist(dlLet, letters);
  refreshFindState(); updatePreview();
});
bLet.addEventListener("input",()=>{ refreshFindState(); updatePreview(); });

function refreshFindState(){ btnFind.disabled = !(selZone.value && pPrim.value.trim() && bNum.value.trim()); }

btnFind.addEventListener("click",()=>{
  const code=currentStreetCode();
  const num=bNum.value.trim(), let_=bLet.value.trim().toUpperCase();
  let recs=zoneRecs().filter(r=>r.streetAdd===code && r.bnum===num && (let_?r.blet===let_:true));
  if(!recs.length){ // relax: ignore letter
    recs=zoneRecs().filter(r=>r.streetAdd===code && r.bnum===num);
  }
  if(recs.length){ goToBuilding(recs[0]); showResults(recs); }
  else { document.getElementById("results").innerHTML='<li class="empty">No building matches that address.</li>'; }
});

btnReset.addEventListener("click",()=>{
  selZone.value=""; zoneNameEl.textContent="";
  [pPrim,pSec,pTer,bNum,bLet].forEach(i=>{ i.value=""; i.disabled=true; });
  document.getElementById("quick").value="";
  document.getElementById("results").innerHTML="";
  refreshFindState(); updatePreview(); clearHighlight();
});

/* ---------- quick find ---------- */
const quick=document.getElementById("quick");
const resultsEl=document.getElementById("results");
quick.addEventListener("input",()=>{
  const q=quick.value.trim().toLowerCase(); resultsEl.innerHTML="";
  if(!q) return;
  const out=[];
  for(const r of buildingIndex){
    if(r.building.toLowerCase().includes(q)||r.roadName.toLowerCase().includes(q)||r.streetAdd.toLowerCase().includes(q)){
      out.push(r); if(out.length>=80) break; }
  }
  showResults(out);
});
function showResults(list){
  if(!list.length){ resultsEl.innerHTML='<li class="empty">No matches.</li>'; return; }
  resultsEl.innerHTML="";
  list.forEach(r=>{ const li=document.createElement("li");
    li.innerHTML=`<b>${r.building||"—"}</b> · Zone ${r.zoneCode} ${r.zoneName}
      <span class="sub">${r.streetAdd?("St "+r.streetAdd):""}${r.roadName?" · "+r.roadName:""} · ${r.area}</span>`;
    li.onclick=()=>goToBuilding(r); resultsEl.appendChild(li); });
}

/* ---------- navigation ---------- */
function clearHighlight(){ highlight.forEach(l=>{ try{ l.setStyle({color:C.building,weight:1.4,fill:true,fillColor:C.building,fillOpacity:0}); }catch(e){} }); highlight=[]; }
function goToBuilding(rec){
  clearHighlight(); const lyr=rec.layer;
  collapseOnMobile();                       // reveal the map on phones
  try{ if(lyr.getBounds) map.flyToBounds(lyr.getBounds(),{maxZoom:20,padding:[40,40]}); else if(lyr.getLatLng) map.flyTo(lyr.getLatLng(),20); }catch(e){}
  try{ lyr.setStyle({color:C.highlight,weight:3,fill:true,fillColor:C.highlight,fillOpacity:.4}); highlight=[lyr]; }catch(e){}
  setTimeout(()=>{ try{lyr.openPopup();}catch(e){} },650);
}

/* ---------- finish ---------- */
function finishLoad(){
  refreshControls();
  if(SETTINGS.startCenter&&SETTINGS.startZoom) map.setView(SETTINGS.startCenter,SETTINGS.startZoom);
  else if(allBounds.length){ let b=allBounds[0]; for(let i=1;i<allBounds.length;i++) b=b.extend(allBounds[i]); map.fitBounds(b.pad(0.05)); }
  else map.setView([34.395,35.895],14);
  try{ refreshRoadText(); }catch(e){} buildZones(); updatePreview();
  console.log("Buildings indexed:",buildingIndex.length,"| zones:",Object.keys(zones).length);
}
L.control.scale({imperial:false}).addTo(map);
</script>
</body>
</html>
